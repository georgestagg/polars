name: Release Python (Emscripten)

on:
  workflow_dispatch:
    inputs:
      sha:
        description: Commit SHA
        type: string

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10

defaults:
  run:
    shell: bash

jobs:
  build-wheel:
    runs-on: self-hosted
    container: ghcr.io/georgestagg/polars:rust-ci

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha || 'emscripten' }}
          path: polars
      
      - name: Setup rustup
        uses: dtolnay/rust-toolchain@nightly

      - name: Check disk space
        run: df -h

      - name: Setup Python
        run: |
          python3 -m venv /opt/python
          /opt/python/bin/pip install -r polars/py-polars/requirements-dev.txt
          echo "/opt/python/bin" >> $GITHUB_PATH

      - name: Build wheel
        working-directory: polars/py-polars
        run: |
          rustup toolchain link stage2 /opt/rust/build/host/stage2
          rustup toolchain list
          rustc +stage2 -vV
          RUSTUP_TOOLCHAIN=stage2 maturin build --release -j 2 -o dist \
            --target wasm32-unknown-emscripten -i python3.10 -- \
            -C link-self-contained=no

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-polars-emscripten-wasm32
          path: polars/py-polars/dist/*.whl

  publish-to-github:
    needs: build-wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha || 'emscripten' }}

      - name: Download wheel
        uses: actions/download-artifact@v4
        with:
          name: wheel-polars-emscripten-wasm32
          path: dist

      - name: Get version from Cargo.toml
        id: version
        working-directory: py-polars
        run: |
          VERSION=$(grep -m 1 -oP 'version = "\K[^"]+' Cargo.toml)
          if [[ "$VERSION" == *"-"* ]]; then
            IS_PRERELEASE=true
          else
            IS_PRERELEASE=false
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "is_prerelease=$IS_PRERELEASE" >> $GITHUB_OUTPUT

      - name: Create GitHub release
        uses: elgohr/Github-Release-Action@v5
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          title: Python Polars (Pyodide) ${{ steps.version.outputs.version }}
          tag: py-${{ steps.version.outputs.version }}-wasm

      - name: Upload wheel to GitHub release
        run: gh release upload $TAG $FILES --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: py-${{ steps.version.outputs.version }}-wasm
          FILES: dist/*.whl

      - name: Publish GitHub release
        run: gh release edit $TAG --draft=false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: py-${{ steps.version.outputs.version }}-wasm
