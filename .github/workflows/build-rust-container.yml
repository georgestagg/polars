name: Build and publish Rust container

on:
  workflow_dispatch:

jobs:
  build-and-publish-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Polars
        uses: actions/checkout@v4
        ref: emscripten-ci
        with:
          sparse-checkout: .github/workflows/containers/rust-ci/
      - name: Log in to the GitHub Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
      - name: Pull forked LLVM Container
        run: docker pull ghcr.io/georgestagg/llvm-project:wasm-ci
      - name: Build and publish Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./.github/workflows/containers/rust-ci
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
